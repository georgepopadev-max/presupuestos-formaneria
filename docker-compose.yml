version: "3.9"

services:
  # PostgreSQL - Base de datos principal
  postgres:
    image: postgres:16-alpine
    container_name: presupuestos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-formaneria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-presupuestos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-formaneria} -d ${POSTGRES_DB:-presupuestos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache (opcional, para cuando se implemente caché)
  redis:
    image: redis:7-alpine
    container_name: presupuestos_cache
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
