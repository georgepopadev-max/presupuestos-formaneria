# Backend API - Node.js + PostgreSQL
#Crear primero en render.com → New → PostgreSQL

services:
  - type: web
    name: presupuestos-formaneria-server
    repo: https://github.com/georgepopadev-max/presupuestos-formaneria.git
    branch: master
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: presupuestos-formaneria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
